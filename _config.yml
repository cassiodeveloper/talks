# Site
name: "Cássio Pereira | Talks"
title: "Talks & Workshops by Cássio Pereira"
tagline: "AppSec & DevSecOps talks, keynotes and workshops"
description: "Talks, keynotes and workshops on Application Security and DevSecOps by Cássio Pereira — from OWASP and BSides conferences to hands-on developer workshops across Europe and Brazil. Browse and filter every talk by event, topic, year and language."
logo: 'assets/images/logo.png'
favicon: 'assets/images/logo.png'
url: "https://www.cassiodeveloper.com.br"
baseurl: /talks
lang: en
google_analytics: 'G-EY9RYD056V'
mailchimp-list: 'https://about.us4.list-manage.com/subscribe/post?u=968adfbf049f7a350d19507dd&amp;id=17db7a9dc3&amp;f_id=00ae09e9f0'
include: ["_pages"]
permalink: /:title/

# SEO (jekyll-seo-tag)
author: Cassio
twitter:
  username: cassiodeveloper
  card: summary_large_image
social:
  name: Cássio Pereira
  links:
    - https://twitter.com/cassiodeveloper
    - https://www.linkedin.com/in/cassiodeveloper
    - https://github.com/cassiodeveloper
    - https://www.cassiodeveloper.com.br

# Default Open Graph image + post metadata
defaults:
  - scope:
      path: ""
    values:
      image: /assets/images/jumbotron.jpg
  - scope:
      path: ""
      type: posts
    values:
      author: Cassio
      layout: post

# Authors
authors:
  Cassio:
    name: Cássio Pereira
    display_name: Cássio Pereira
    avatar: /assets/images/profile23.jpg
    email: cassio@cassiobp.com.br
    web: https://www.cassiodeveloper.com.br
    twitter: https://twitter.com/cassiodeveloper
    description: "👨‍💻Cyber Security Engineer - Teach and help you to build secure software. #AppSec #DevSecOps 👨‍🎓Developer🕵️‍♂️Forensics👨‍🏫Teacher🎤Speaker"

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
    
# Archives
jekyll-archives:
  enabled:
    - categories
  layout: archive
  permalinks:
    category: '/category/:name/'
    
# Pagination — disabled: the Talks index shows every talk so the
# client-side filters (event / topic / year / language) span all of them.

# Other
markdown: kramdown

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Adsense (change to "enabled" to activate, also your client id and ad slot. Create a new ad unit from your Adsense account to get the slot.)
# adsense: "disabled"
# adsense-data-ad-client: "ca-pub-3412143450191416"
# adsense-data-ad-slot: "1363087678"

# Lazy Images ("enabled" or "disabled")
lazyimages: "disabled"

exclude: [changelog.md, LICENSE.txt, README.md, Gemfile, Gemfile.lock]
